name: Security

on:
  push:
    branches: ["**"]
  pull_request:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    permissions:
      contents: read
      packages: read
    uses: garymike/security-workflows/.github/workflows/security-scan.yml@0ca59a6b417f14938311189936fea527ebf6385b # v0.4.2
    secrets: inherit

  gha-security:
    permissions:
      contents: read
      packages: read
    uses: garymike/security-workflows/.github/workflows/gha-security.yml@0ca59a6b417f14938311189936fea527ebf6385b # v0.4.2
    secrets: inherit

  sast:
    permissions:
      contents: read
      packages: read
      security-events: write
    uses: garymike/security-workflows/.github/workflows/sast.yml@0ca59a6b417f14938311189936fea527ebf6385b # v0.4.2
    secrets: inherit

  iac-security:
    permissions:
      contents: read
      packages: read
      security-events: write
    uses: garymike/security-workflows/.github/workflows/iac-security.yml@0ca59a6b417f14938311189936fea527ebf6385b # v0.4.2
    secrets: inherit

  codeql:
    # deep engine — run on PRs, main pushes, and the schedule (skip feature-branch pushes)
    if: github.event_name != 'push' || github.ref == 'refs/heads/main'
    permissions:
      contents: read
      security-events: write
      actions: read
    uses: garymike/security-workflows/.github/workflows/codeql.yml@0ca59a6b417f14938311189936fea527ebf6385b # v0.4.2
    with:
      languages: javascript-typescript,python

  audit:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    uses: garymike/security-workflows/.github/workflows/security-audit.yml@0ca59a6b417f14938311189936fea527ebf6385b # v0.4.2
    secrets: inherit
