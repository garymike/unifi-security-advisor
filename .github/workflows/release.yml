name: Release

on:
  push:
    tags: ['v*']

# The updater signing key is provided via secrets; see RELEASING.md. The build
# succeeds without them (producing an unsigned installer), but the in-app
# updater requires the signed artifacts, so set the secrets before relying on it.
permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows first (the maintainer's platform). Add macos-latest /
          # ubuntu-22.04 entries here later — ubuntu needs the same WebKitGTK
          # deps the test workflow's `rust` job installs.
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
      - name: Install Rust
        run: rustup update stable --no-self-update
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - uses: tauri-apps/tauri-action@fce9c6108b31ea247710505d3aaaa893ee6768d4 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: UniFi Security Advisor ${{ github.ref_name }}
          releaseBody: See CHANGELOG.md for what changed in this release.
          # Publish as a draft: review the built artifacts, then publish the
          # release manually. Installed apps only see it once it's published
          # (a draft is never "latest").
          releaseDraft: true
          prerelease: false
          # Point the updater's generic windows-x86_64 entry at the NSIS
          # installer instead of the MSI (tauri defaults to MSI "for legacy
          # reasons"). NSIS does smooth per-user background updates; MSI
          # auto-updates are clunky and can trigger UAC / a full reinstall.
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
