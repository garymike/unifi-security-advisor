name: Test

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Detect which parts of the tree changed so we only run the test suites that
  # can actually be affected. Docs / .gitignore / .claude-only changes skip both
  # test jobs; a JS-only change skips the (~6 min) Rust job, and vice versa.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      js: ${{ steps.filter.outputs.js }}
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: filter
        with:
          filters: |
            js:
              - 'src/**'
              - 'tests/**'
              - 'samples/**'
              - 'tools/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig*.json'
              - 'vite.config.*'
              - 'vitest.config.*'
              - 'svelte.config.*'
              - '.github/workflows/test.yml'
            rust:
              - 'src-tauri/**'
              - '.github/workflows/test.yml'

  test:
    name: JS (typecheck + vitest)
    needs: changes
    if: ${{ needs.changes.outputs.js == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test

  rust:
    name: Rust (cargo test)
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # The Tauri crate links against WebKitGTK/GTK, so its system dev
      # packages must be present for the lib to compile — even though the
      # unit tests only exercise pure parsing logic (no window/webview).
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev
      # ubuntu-latest ships a stable Rust toolchain, so no toolchain action
      # is needed. Swatinem/rust-cache caches the registry + build artifacts
      # keyed on Cargo.lock so tauri doesn't recompile from scratch each run.
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: src-tauri
      - name: Run cargo test
        run: cargo test --lib --manifest-path src-tauri/Cargo.toml
